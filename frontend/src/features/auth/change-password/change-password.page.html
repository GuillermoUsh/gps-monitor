<div class="login-wrapper">
  <div class="login-box">

    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🔑</div>
      <h1 class="text-2xl font-bold text-gray-800">Cambiá tu contraseña</h1>
      <p class="text-amber-600 mt-2 text-sm font-medium">
        Es tu primer ingreso. Por seguridad, debés establecer una nueva contraseña.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

      <div class="flex flex-col gap-2">
        <label class="font-semibold text-sm text-gray-700">Contraseña temporal</label>
        <p-password formControlName="currentPassword" placeholder="La que recibiste por email"
                    [feedback]="false" [toggleMask]="true"
                    styleClass="w-full" inputStyleClass="w-full" />
      </div>

      <div class="flex flex-col gap-2">
        <label class="font-semibold text-sm text-gray-700">Nueva contraseña</label>
        <p-password formControlName="newPassword" placeholder="Mínimo 8 caracteres"
                    [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
      </div>

      @if (error()) {
        <p-message severity="error" [text]="error()!" styleClass="w-full" />
      }

      <p-button type="submit" label="Guardar contraseña" icon="pi pi-check"
                [loading]="loading()" [disabled]="form.invalid" styleClass="w-full" />
    </form>

  </div>
</div>
