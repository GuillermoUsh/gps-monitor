<div class="users-layout">
  <p-toast />

  <div class="topbar">
    <div class="topbar__left">
      <p-button icon="pi pi-arrow-left" [text]="true" severity="secondary" size="small" (onClick)="goBack()" />
    </div>
    <span class="topbar__title">Usuarios</span>
    <div class="topbar__right"></div>
  </div>

  <div class="action-bar">
    <p-button label="Nuevo usuario" icon="pi pi-plus" size="small" (onClick)="openCreateDialog()" />
  </div>

  <div class="table-wrapper">
    <p-table
      [value]="users()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="20"
      emptyMessage="Sin usuarios"
    >
      <ng-template #header>
        <tr>
          <th>Email</th>
          <th>Rol</th>
          <th>Verificado</th>
          <th>Creado</th>
          <th style="width: 8rem"></th>
        </tr>
      </ng-template>
      <ng-template #body let-user>
        <tr>
          <td>{{ user.email }}</td>
          <td>
            <p-tag [value]="getRoleLabel(user.role)" [severity]="getRoleSeverity(user.role)" />
          </td>
          <td>
            @if (user.verified) {
              <p-tag value="Sí" severity="success" />
            } @else {
              <p-tag value="No" severity="warn" />
            }
          </td>
          <td>{{ user.created_at | date:'dd/MM/yyyy' }}</td>
          <td>
            @if (user.role === 'driver') {
              <p-button
                icon="pi pi-id-card"
                label="Perfil"
                severity="secondary"
                [text]="true"
                size="small"
                (onClick)="openProfileDialog(user)"
                pTooltip="Perfil de conductor"
              />
            }
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <!-- Create user dialog -->
  <p-dialog
    header="Nuevo usuario"
    [visible]="showCreateDialog()"
    (visibleChange)="showCreateDialog.set($event)"
    [modal]="true"
    [style]="{ width: '28rem' }"
    [draggable]="false"
  >
    <div class="dialog-body">
      <div class="field">
        <label for="email">Email *</label>
        <input
          id="email"
          pInputText
          type="email"
          [(ngModel)]="formEmail"
          placeholder="usuario@ejemplo.com"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña *</label>
        <div class="password-row">
          <input
            id="password"
            pInputText
            [(ngModel)]="formPassword"
            [style]="{ flex: 1 }"
          />
          <p-button
            icon="pi pi-refresh"
            severity="secondary"
            [text]="true"
            pTooltip="Regenerar"
            (onClick)="regeneratePassword()"
          />
        </div>
      </div>

      <div class="field">
        <label for="role">Rol *</label>
        <p-select
          inputId="role"
          [options]="roleOptions"
          [(ngModel)]="formRole"
          optionLabel="label"
          optionValue="value"
          appendTo="body"
        />
      </div>
    </div>

    <ng-template #footer>
      <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="showCreateDialog.set(false)" />
      <p-button
        label="Crear"
        icon="pi pi-check"
        [loading]="saving()"
        [disabled]="!formEmail || !formPassword"
        (onClick)="saveUser()"
      />
    </ng-template>
  </p-dialog>

  <!-- Credentials dialog -->
  <p-dialog
    header="Usuario creado"
    [visible]="showCredentialsDialog()"
    (visibleChange)="showCredentialsDialog.set($event)"
    [modal]="true"
    [style]="{ width: '26rem' }"
    [draggable]="false"
  >
    <div class="dialog-body">
      <p class="text-sm text-color-secondary">
        Compartí estas credenciales con el usuario. Deberá cambiar la contraseña en su primer acceso.
      </p>
      <div class="field">
        <label class="font-semibold text-sm">Email</label>
        <input pInputText [value]="createdEmail" readonly />
      </div>
      <div class="field">
        <label class="font-semibold text-sm">Contraseña</label>
        <input pInputText [value]="createdPassword" readonly />
      </div>
    </div>
    <ng-template #footer>
      <p-button label="Cerrar" icon="pi pi-check" (onClick)="showCredentialsDialog.set(false)" />
    </ng-template>
  </p-dialog>

  <!-- Driver profile dialog -->
  <p-dialog
    header="Perfil de conductor"
    [visible]="showProfileDialog()"
    (visibleChange)="showProfileDialog.set($event)"
    [modal]="true"
    [style]="{ width: '30rem' }"
    [draggable]="false"
  >
    <div class="dialog-body">
      <div class="field">
        <label class="text-sm font-medium text-color-secondary">Usuario</label>
        <p class="font-semibold m-0">{{ profileEmail }}</p>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="pNombre">Nombre</label>
          <input id="pNombre" pInputText [(ngModel)]="profileNombre" placeholder="Ej: Juan" />
        </div>
        <div class="field">
          <label for="pApellido">Apellido</label>
          <input id="pApellido" pInputText [(ngModel)]="profileApellido" placeholder="Ej: García" />
        </div>
      </div>

      <div class="field">
        <label for="pLicencia">N° de licencia</label>
        <input id="pLicencia" pInputText [(ngModel)]="profileLicencia" placeholder="Ej: 12345678" />
      </div>

      <div class="field">
        <label for="pVencimiento">Vencimiento de licencia</label>
        <p-datepicker
          inputId="pVencimiento"
          [(ngModel)]="profileVencimiento"
          dateFormat="dd/mm/yy"
          [showIcon]="true"
          appendTo="body"
        />
      </div>

      <div class="field">
        <label for="pTelefono">Teléfono</label>
        <input id="pTelefono" pInputText [(ngModel)]="profileTelefono" placeholder="+54 9 11 1234-5678" />
      </div>

      <div class="field field--checkbox">
        <p-checkbox inputId="pCursoPuerto" [(ngModel)]="profileCursoPuerto" [binary]="true" />
        <label for="pCursoPuerto">Curso de puerto habilitado</label>
      </div>

      <div class="field">
        <label for="pNotas">Notas</label>
        <textarea
          id="pNotas"
          pTextarea
          [(ngModel)]="profileNotas"
          rows="3"
          placeholder="Observaciones adicionales..."
          style="width: 100%; resize: vertical;"
        ></textarea>
      </div>
    </div>

    <ng-template #footer>
      <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="showProfileDialog.set(false)" />
      <p-button label="Guardar" icon="pi pi-check" [loading]="saving()" (onClick)="saveProfile()" />
    </ng-template>
  </p-dialog>

</div>
