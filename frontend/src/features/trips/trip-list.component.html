<div class="trips-layout">

  <p-toast />
  <p-confirmDialog />

  <p-toolbar styleClass="mb-4">
    <ng-template #start>
      <span class="text-xl font-bold">Viajes</span>
    </ng-template>
    <ng-template #end>
      <p-button
        label="Actualizar"
        icon="pi pi-refresh"
        severity="secondary"
        [text]="true"
        [loading]="loading()"
        (onClick)="loadTrips()"
        styleClass="mr-2"
      />
      <p-button
        label="Nuevo viaje"
        icon="pi pi-plus"
        (onClick)="openNewTripDialog()"
      />
    </ng-template>
  </p-toolbar>

  <p-table
    [value]="trips()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="10"
    styleClass="p-datatable-sm"
    [rowHover]="true"
  >
    <ng-template #header>
      <tr>
        <th>ID</th>
        <th>Ruta</th>
        <th>Km</th>
        <th>Estado</th>
        <th>Inicio</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template #body let-trip>
      <tr>
        <td class="font-mono text-sm text-gray-500">{{ trip.id | slice:0:8 }}...</td>
        <td>{{ trip.routeName ?? trip.routeId }}</td>
        <td>{{ trip.distanceKm | number:'1.1-1' }} km</td>
        <td>
          <p-tag
            [value]="trip.status"
            [severity]="getStatusSeverity(trip.status)"
          />
        </td>
        <td>{{ trip.startedAt | date:'dd/MM HH:mm' }}</td>
        <td>
          <div class="actions">
            @if (trip.status === 'active') {
              <p-button
                label="Completar"
                icon="pi pi-check"
                severity="info"
                size="small"
                [text]="true"
                (onClick)="completeTrip(trip)"
              />
              <p-button
                label="Cancelar"
                icon="pi pi-times"
                severity="danger"
                size="small"
                [text]="true"
                (onClick)="cancelTrip(trip)"
              />
              <p-button
                label="Simulador"
                icon="pi pi-map-marker"
                severity="secondary"
                size="small"
                [outlined]="true"
                (onClick)="goToSimulator(trip.id)"
              />
            }
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="6" class="text-center text-gray-400 py-8">
          Sin viajes. Iniciá uno nuevo.
        </td>
      </tr>
    </ng-template>
  </p-table>

</div>

<!-- New Trip Dialog -->
<p-dialog
  header="Iniciar nuevo viaje"
  [visible]="showNewTripDialog()"
  (visibleChange)="showNewTripDialog.set($event)"
  [modal]="true"
  [style]="{ width: '420px' }"
  [draggable]="false"
>
  <div class="dialog-body">
    <div class="field">
      <label>Seleccioná una ruta</label>
      <p-select
        [options]="routeOptions"
        [(ngModel)]="selectedRouteId"
        placeholder="-- Elegí una ruta --"
        [style]="{ width: '100%' }"
        appendTo="body"
        [filter]="true"
        filterPlaceholder="Buscar ruta..."
      />
    </div>
    <div class="field mt-4">
      <label>Asignar chofer</label>
      <p-select
        [options]="driverOptions"
        [(ngModel)]="selectedDriverId"
        placeholder="-- Elegí un chofer --"
        [style]="{ width: '100%' }"
        appendTo="body"
        [filter]="true"
        filterPlaceholder="Buscar chofer..."
      />
    </div>
  </div>

  <ng-template #footer>
    <p-button
      label="Cancelar"
      severity="secondary"
      [text]="true"
      (onClick)="showNewTripDialog.set(false)"
    />
    <p-button
      label="Iniciar viaje"
      icon="pi pi-play"
      [loading]="starting()"
      (onClick)="startTrip()"
    />
  </ng-template>
</p-dialog>
